
<p>Demonstrates conditionally returning a different value while doing dfs.</p>

<pre><code class="language-java">
<textarea hidden>
class Solution {
    //Returns the height if balanced, else -1.
    private int dfs(TreeNode root) {
        if (root == null) {
            return 0;
        }
        int leftHeight = dfs(root.left);
        if (leftHeight == -1) {
            return -1;
        }
        int rightHeight = dfs(root.right);
        if (rightHeight == -1) {
            return -1;
        }
        if (Math.abs(leftHeight - rightHeight) > 1) {
            return -1;
        }
        return 1 + Math.max(leftHeight, rightHeight);
    }

    public boolean isBalanced(TreeNode root) {
        return dfs(root) != -1;
    }
}
